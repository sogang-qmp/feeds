# Anthropic API
anthropic:
  api_key: "YOUR_ANTHROPIC_API_KEY"
  model: "claude-sonnet-4-6"
  max_tokens: 8192

# Slack
slack:
  bot_token: "xoxb-YOUR-SLACK-BOT-TOKEN"
  channel: "#journal-feed"
  max_message_length: 4000

# Feed settings
feeds:
  opml_file: "feeds.opml"
  max_articles_per_feed: 20
  max_summary_length: 500
  days_lookback: 1
