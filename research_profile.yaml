# ============================================================
# Core Identity
# ============================================================
researcher:
  name: Young Woo Choi
  position: Assistant Professor
  affiliation: Sogang University, Department of Physics
  career_stage: early-career faculty  # useful for filtering junior vs senior positions

# ============================================================
# Research Areas (hierarchical: broad → specific)
# ============================================================
research_areas:
  primary:
    - first-principles computational methods
    - electron-phonon coupling and polaron physics
    - superconductivity
    - 2D materials and heterostructures (TMDs, graphene, van der Waals)
    - many-body perturbation theory (GW, BSE)
    - low-dimensional materials and nanostructures
    - charge density waves (CDW)
    - surface physics and image potential states

  secondary:
    - structural relaxation in moiré systems
    - Wannier function methods
    - spectral functions and excitonic properties
    - rare-earth intermetallics and hydrides
    - AI-assisted computational automation
    - topological properties
    - strongly correlated materials
    - polaron calculations and multivalley effects
    - quasiparticle band structures

  methods:
    - density functional theory (DFT, VASP, Quantum ESPRESSO, SIESTA)
    - electron-phonon coupling calculations (EPW)
    - GW approximation and BerkeleyGW
    - Bethe-Salpeter equation (BSE)
    - Wannier function interpolation
    - ab initio molecular dynamics
    - nudged elastic band (NEB) calculations
    - machine learning for materials science and DFT automation
    - polaron calculations via EPW
    - spectral function and optical response
    - HSE06 hybrid functional calculations
    - image potential state calculations
    - 1D coupled-channel solvers for surface states

  materials_systems:
    - 2D transition metal dichalcogenides (TMDs: MoS2, WS2, MoTe2, TiSe2, HfS2, ReS2)
    - graphene and moiré superlattices (twisted bilayer graphene, flat bands, twisted MoS2, moiré phonons)
    - van der Waals heterostructures and interfaces (VSe3-Hf2Se9, ReS2-WS2, Bi2O2Se)
    - 1D materials (carbon nanotubes, phosphorus nanostructures, XCN chains)
    - rare-earth compounds (strontium ruthenate Sr2RuO4, GdNiBi2, Gd2C hydrides)
    - surfaces and image potential states
    - perovskites (MAPbBr3)
    - charge density wave materials (1T-TiSe2)
    - transition metal pnictides (NiPS3)

