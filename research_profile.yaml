    - Bethe-Salpeter equation (BSE) for excitonic effects
    - GW-BSE many-body perturbation theory
    - exciton-phonon coupling in bulk TMDs
    - polaron physics and multivalley effects in 2D materials
    - multivalley polaron in transition metal dichalcogenides
    - electron-phonon coupling and EPW calculations
    - spectral functions and excitonic properties
    - polaron self-energy and band renormalization
    - many-body perturbation theory (GW, BSE)
    - moiré superlattices and commensurate lock-in
    - moiré phonons in twisted bilayer systems
    - strain-tuned moiré physics and flat bands
    - first-principles computational methods
    - 2D materials and heterostructures (TMDs, graphene, van der Waals)
    - moiré superlattices and twisted heterostructures
    - K-dosed and surface-engineered 2D materials
    - rare-earth hydrides and Gd2C compounds
    - Claude-assisted and LLM-driven DFT workflow automation
    - Claude-assisted EPW automation and I/O orchestration
    - Quantum ESPRESSO and EPW automation with NC pseudopotentials
    - nudged elastic band (NEB) calculations for CDW
    - superconductivity
    - 1D materials and chains (carbon chains, XCN chains, phosphorus nanostructures)

  secondary:
    - structural relaxation in moiré systems
    - Wannier function methods and interpolation
    - rare-earth intermetallics and hydrides
    - low-dimensional materials and nanostructures
    - topological properties
    - strongly correlated materials
    - optical response calculations
    - piezoelectricity in layered materials
    - AI-assisted computational automation and orchestration
    - slab band structure and surface potential calculations
