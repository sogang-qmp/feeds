    - polaron calculations via EPW and spectral functions
    - HSE06 hybrid functional calculations
    - DFT+U calculations
    - image potential state calculations
    - 1D and 3D coupled-channel solvers with JAX
    - Claude/LLM-assisted DFT automation and I/O orchestration
    - spin-orbit coupling (SOC) calculations
    - Quantum ESPRESSO EPW automation with NC pseudopotentials
    - SIESTA DFT and slab calculations
    - SIESTA structural relaxation

  materials_systems:
    - 1T-TiSe2 and charge density wave phases
    - PtTe2 charge density wave and strain engineering
    - 2D transition metal dichalcogenides (TMDs: MoS2, WS2, MoTe2, TiSe2, HfS2, ReS2)
    - graphene and moiré superlattices (twisted bilayer graphene, flat bands, twisted MoS2, moiré phonons)
    - twisted multilayer MoTe2
