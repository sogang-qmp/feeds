# Research Profile for Job/Conference/Opportunity Recommendation
# Last updated: 2026-03-06
# Update method: see comments at bottom

# ============================================================
# Core Identity
# ============================================================
researcher:
  name: Your Name
  position: Assistant Professor
  affiliation: University, Department
  career_stage: early-career faculty  # useful for filtering junior vs senior positions

# ============================================================
# Research Areas (hierarchical: broad → specific)
# ============================================================
research_areas:
  primary:
    - first-principles computational methods
    - electron-phonon coupling
    - superconductivity
    - low-dimensional materials and nanostructures

  secondary:
    - surface physics and image potential states
    - Wigner crystals
    - quantum materials
    - many-body perturbation theory (GW, BSE)

  methods:
    - density functional theory (DFT, VASP)
    - electron-phonon coupling calculations
    - GW approximation / BerkeleyGW
    - Wannier functions
    - ab initio molecular dynamics
    - machine learning for materials science

  materials_systems:
    - graphene moiré superlattices (twisted bilayer graphene, flat bands)
    - carbon nanotubes (CNT)
    - phosphorus nanostructures (1D)
    - strontium ruthenate (Sr2RuO4)
    - 2D van der Waals heterostructures
    - surfaces and interfaces

# ============================================================
# Keywords (for fuzzy matching against job postings)
# ============================================================
keywords:
  # These are used for generous matching — any overlap triggers recommendation
  strong:  # high relevance
    - electron-phonon
    - superconductor
    - first-principles
    - ab initio
    - DFT
    - computational materials
    - condensed matter theory
    - low-dimensional
    - nanostructure
    - moiré
    - flat band
    - graphene
    - 2D materials
    - phonon
    - BerkeleyGW
    - GW approximation
    - Wannier

  moderate:  # related enough to flag
    - computational physics
    - materials science
    - electronic structure
    - band structure
    - density of states
    - van der Waals
    - heterostructure
    - topological
    - strongly correlated
    - many-body
    - VASP
    - Quantum ESPRESSO
    - machine learning materials
    - surface states
    - nanotube
    - carbon materials

  weak:  # broad but still worth seeing
    - quantum materials
    - nanoscience
    - theoretical physics
    - solid state physics
    - high-performance computing
    - scientific computing
    - physics faculty
    - condensed matter

# ============================================================
# Position Types of Interest
# ============================================================
opportunity_filters:
  position_types:
    - postdoc          # for recruiting to lab
    - PhD student      # for recruiting
    - faculty          # peer networking, collaboration
    - research scientist
    - workshop
    - conference
    - summer school

  geography:
    preferred:
      - South Korea
      - worldwide (remote/hybrid)
    open_to:
      - any  # generous — don't filter by location

  exclude_keywords:
    - experimental only
    - clinical
    - biology
    - chemistry wet lab

# ============================================================
# Update Strategy
